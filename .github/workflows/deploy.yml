name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:   # Allow manual trigger from GitHub UI

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/market-research-api

# Note: github.repository_owner is always lowercase for ghcr.io compatibility

jobs:
  # ── Job 1: Build & push Docker image to ghcr.io ───────────────────────────
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # Auto-provided, no secret needed

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 2: Deploy backend to Azure Container Apps ─────────────────────────
  deploy-backend:
    runs-on: ubuntu-latest
    needs: build-backend
    environment: production

    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy image to Azure Container Apps
        run: |
          az containerapp update \
            --name market-research-api \
            --resource-group market-research-rg \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            --set-env-vars \
              LLM_PROVIDER=${{ secrets.LLM_PROVIDER }} \
              LLM_MODEL=${{ secrets.LLM_MODEL }} \
              DEMO_EMAIL=${{ secrets.DEMO_EMAIL }} \
              APP_ENV=production \
              LOG_LEVEL=INFO \
              "DATABASE_URL=sqlite:////app/data/market_research.db" \
              PIPELINE_MAX_ARTICLE_CHARS=3000 \
              PIPELINE_MAX_SOURCE_CHARS=2000 \
              PIPELINE_MAX_JUDGE_CLAIMS=3 \
              PIPELINE_MAX_THEMES=2 \
              PIPELINE_MAX_COMPETITOR_ACTIVITIES=2 \
              PIPELINE_HALLUCINATION_THRESHOLD=0.8 \
              GOOGLE_API_KEY=secretref:google-api-key \
              SECRET_KEY=secretref:secret-key \
              DEMO_PASSWORD=secretref:demo-password

      - name: Set ALLOWED_ORIGINS
        run: |
          az containerapp update \
            --name market-research-api \
            --resource-group market-research-rg \
            --set-env-vars ALLOWED_ORIGINS=${{ secrets.ALLOWED_ORIGINS }}

  # ── Job 3: Build & deploy frontend to Azure Static Web Apps ───────────────
  deploy-frontend:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_GREEN_RIVER_07505240F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: "src/frontend"
          output_location: "dist"
          app_build_command: "npm install && npm run build"
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}